[www]
user = www-data
group = www-data
listen = 127.0.0.1:9000
pm = dynamic
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 35
chdir = /var/www/html
php_admin_value[error_log] = /var/log/php-fpm.log
php_admin_flag[log_errors] = on
catch_workers_output = yes
